name: Deploy Montelar static site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "*.html"
      - "CNAME"
      - ".github/workflows/github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: montelar-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build site artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp ./*.html _site/
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi
          cp index.html _site/404.html
          touch _site/.nojekyll
          find _site -maxdepth 2 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
