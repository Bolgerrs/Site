name: Publish Montelar static site

on:
  push:
    branches: [main]
    paths:
      - "*.html"
      - "CNAME"
      - ".github/workflows/github-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: montelar-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site folder
        run: |
          rm -rf _site
          mkdir -p _site
          cp ./*.html _site/
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi
          cp index.html _site/404.html
          touch _site/.nojekyll
          find _site -maxdepth 2 -type f | sort

      - name: Publish to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
          single-commit: true
